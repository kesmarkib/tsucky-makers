<!DOCTYPE html>
<head>
    <meta lang="en">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link rel="icon" type="image/x-icon" href="images/edited/faviconv2.png">

    <title>Tsucky-maker</title>

    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="stuff">
        <div id="hitbox-container" class="invisible"></div>
        <div id="tsucky-container"></div>
        <div id="editor" class="editor-container">
            <div id="header-text"><span>Editor </span><span id="derp">:3</span></div>
            <div id="part-editor" class="editor-container">
                <div id="part-name"></div>
                <div id="hue-selector" class="selector editor-container">
                    <input type="range" min="0" max="360" value="0" class="slider" id="hue-slider">
                    <h1 id="hue-value">value</h1>
                </div>
                <div id="brightness-selector" class="selector editor-container">
                    <input type="range" min="25" max="75" value="50" class="slider" id="brightness-slider">
                    <h1 id="brightness-value">value</h1>
                </div>
                <div id="grayscale-selector" class="selector editor-container">
                    <input type="range" min="0" max="100" value="100" class="slider" id="grayscale-slider">
                    <h1 id="grayscale-value">value</h1>
                </div>
                <div id="effects" class="editor-box">
                    <label class="switch">
                        <input type="checkbox" id="rainbow-switch">
                        <span class="checkbox-slider round rainbow"></span>
                    </label>
                    <label id="rainbow-text" class="editor-box-text">Rainbow</label>
                </div>
                <hr style="width: 95%;">
            </div>
            <div id="select-all" class="editor-box">
                <label class="switch">
                    <input type="checkbox" id="select-all-switch">
                    <span class="checkbox-slider round"></span>
                </label>
                <label id="select-all-text" class="editor-box-text">Select All</label>
            </div>
            <div id="background-editor" class="editor-box">
                <input type="color" id="bg-picker" value="#141014">
                <label id="bg-picker-text" class="editor-box-text">Change Background Color</label>
            </div>
            <div id="export-editor" class="editor-box">
                <input type="button" value="Export" onclick="exportImage()">
                <div>
                    <label class="switch">
                        <input type="checkbox">
                        <span class="checkbox-slider round"></span>
                    </label>
                    <label id="export-bg-text" class="editor-box-text">Background</label>
                </div>
            </div>
        </div>
        <span id="notice">[Achievments enabled]</span>
    </div>
    <script src="script.js"></script>
</body>
